name: update quotes

on:
  schedule:
    - cron: "*/15 13-20 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: quotes
  cancel-in-progress: true

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 100
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install --quiet yfinance
      - name: fetch loop (~90 min, every ~6 min)
        run: |
          git config user.name "quotes-bot"
          git config user.email "actions@github.com"
          for i in $(seq 1 15); do
            python fetch_quotes.py || true
            git add quotes.json
            if ! git diff --cached --quiet; then
              git commit -m "quotes update"
              git push || (git pull --rebase && git push)
            fi
            [ "$i" -lt 15 ] && sleep 360
          done
