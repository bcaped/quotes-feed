name: update quotes

on:
  schedule:
    - cron: "*/15 13-20 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: quotes
  cancel-in-progress: true

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install --quiet yfinance
      - run: python fetch_quotes.py
      - name: commit if changed
        run: |
          git config user.name "quotes-bot"
          git config user.email "actions@github.com"
          git add quotes.json
          git diff --cached --quiet || git commit -m "quotes update"
          git push

